version: 0.2

env:
  shell: bash
  variables:
    MODEL_OUTPUT_PATH: "models/object_detection/yolov5s.onnx"
    YOLOV5_REF: "v7.0"
    ENABLE_HF_DEPLOY: "false"

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - python -m pip install --upgrade pip
      - python -m pip install "setuptools<81"
      - pip install -r requirements-conversion.txt
  pre_build:
    commands:
      - test -n "$SOURCE_MODEL_BUCKET"
      - test -n "$SOURCE_MODEL_KEY"
      - test -n "$ECR_REPOSITORY_URI" || { echo "ECR_REPOSITORY_URI is not configured"; exit 1; }
      - test -n "$SNS_TOPIC_ARN" || { echo "SNS_TOPIC_ARN is not configured"; exit 1; }
      - |
        if [[ "${ENABLE_HF_DEPLOY:-false}" == "true" ]]; then
          test -n "${HF_SPACE_ID:-}" || { echo "HF_SPACE_ID is not configured"; exit 1; }
          test -n "${HF_TOKEN:-}" || { echo "HF_TOKEN is not configured"; exit 1; }
          [[ "$HF_SPACE_ID" =~ ^[^/]+/[^/]+$ ]] || { echo "HF_SPACE_ID must use owner/space-name"; exit 1; }
          python -c "import os; from huggingface_hub import HfApi; account = HfApi(token=os.environ['HF_TOKEN']).whoami(); print('Authenticated to Hugging Face as', account['name'])"
        fi
      - ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
      - ECR_REGISTRY="$ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com"
      - |
        if [[ "$ECR_REPOSITORY_URI" != "$ECR_REGISTRY/"* ]]; then
          echo "ECR_REPOSITORY_URI must belong to $ECR_REGISTRY"
          exit 1
        fi
      - IMAGE_TAG="build-${CODEBUILD_BUILD_NUMBER}-$(date +%Y%m%d%H%M%S)"
      - SOURCE_MODEL_NAME="$(basename "$SOURCE_MODEL_KEY")"
      - SOURCE_MODEL_PATH=".build/$SOURCE_MODEL_NAME"
      - mkdir -p "$(dirname "$MODEL_OUTPUT_PATH")" .build
      - |
        if [[ -n "${SOURCE_MODEL_VERSION:-}" ]]; then
          aws s3api get-object \
            --bucket "$SOURCE_MODEL_BUCKET" \
            --key "$SOURCE_MODEL_KEY" \
            --version-id "$SOURCE_MODEL_VERSION" \
            "$SOURCE_MODEL_PATH"
        else
          aws s3 cp \
            "s3://$SOURCE_MODEL_BUCKET/$SOURCE_MODEL_KEY" \
            "$SOURCE_MODEL_PATH"
        fi
      - aws ecr get-login-password --region "$AWS_DEFAULT_REGION" | docker login --username AWS --password-stdin "$ECR_REGISTRY"
      - aws sns publish --topic-arn "$SNS_TOPIC_ARN" --subject "MLOps-YoloV5 build started" --message "CodeBuild $CODEBUILD_BUILD_ID is processing s3://$SOURCE_MODEL_BUCKET/$SOURCE_MODEL_KEY"
  build:
    commands:
      - |
        set -euo pipefail
        if [[ "$SOURCE_MODEL_NAME" == *.onnx ]]; then
          cp "$SOURCE_MODEL_PATH" "$MODEL_OUTPUT_PATH"
        else
          git clone --branch "$YOLOV5_REF" --depth 1 \
            https://github.com/ultralytics/yolov5.git .build/yolov5
          pip install -r .build/yolov5/requirements.txt
          python .build/yolov5/export.py \
            --weights "$SOURCE_MODEL_PATH" \
            --include onnx \
            --opset 17 \
            --imgsz 640 \
            --device cpu
          EXPORTED_MODEL_PATH="${SOURCE_MODEL_PATH%.*}.onnx"
          test -f "$EXPORTED_MODEL_PATH"
          cp "$EXPORTED_MODEL_PATH" "$MODEL_OUTPUT_PATH"
        fi
      - docker build --platform linux/amd64 -f docker/Dockerfile -t "$ECR_REPOSITORY_URI:$IMAGE_TAG" .
      - |
        docker run --rm "$ECR_REPOSITORY_URI:$IMAGE_TAG" python -c \
          "from PIL import Image; from app.services.onnx_inference import predict; result = predict('object_detection', Image.new('RGB', (640, 480))); assert result['model_status'] == 'yolov5s', result; print('YOLOv5 ONNX smoke test passed')"
      - docker push "$ECR_REPOSITORY_URI:$IMAGE_TAG"
      - printf '{"image":"%s","model":"s3://%s/%s","build":"%s"}' "$ECR_REPOSITORY_URI:$IMAGE_TAG" "$SOURCE_MODEL_BUCKET" "$SOURCE_MODEL_KEY" "$CODEBUILD_BUILD_ID" > image-detail.json
      - |
        if [[ "$ENABLE_HF_DEPLOY" == "true" ]]; then
          test -n "$HF_TOKEN"
          test -n "$HF_SPACE_ID"
          python scripts/deploy_to_huggingface.py \
            --repo-id "$HF_SPACE_ID" \
            --model "$MODEL_OUTPUT_PATH"
        fi
  post_build:
    commands:
      - |
        set +e
        if [[ "$CODEBUILD_BUILD_SUCCEEDING" == "1" ]]; then
          aws sns publish --topic-arn "$SNS_TOPIC_ARN" --subject "MLOps-YoloV5 deployment succeeded" --message "Published $ECR_REPOSITORY_URI:$IMAGE_TAG. Hugging Face enabled: $ENABLE_HF_DEPLOY"
        else
          aws sns publish --topic-arn "$SNS_TOPIC_ARN" --subject "MLOps-YoloV5 deployment failed" --message "CodeBuild execution $CODEBUILD_BUILD_ID failed. Review CloudWatch build logs."
        fi
        exit 0

artifacts:
  files:
    - image-detail.json
